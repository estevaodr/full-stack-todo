<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nord Todo - Add Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#5d81ac",
                "background-light": "#f6f7f7",
                "background-dark": "#16191c",
                "nord-dark": "#2e3440",
                "nord-snow": "#e5e9f0",
                "nord-frost": "#5e81ac",
                "nord-border": "#d8dee9",
                "nord-text-muted": "#4c566a"
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .backdrop-blur-nord {
            backdrop-filter: blur(4px);
            background-color: rgba(46, 52, 64, 0.6);
        }
        .modal-shadow {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen relative overflow-hidden">
<!-- Background Dashboard (Obscured) -->
<div class="relative flex h-screen w-full flex-col bg-gray-50 group/design-root overflow-x-hidden" style="--checkbox-tick-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(249,250,251)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3cpath d=%27M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z%27/%3e%3c/svg%3e');">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-gray-200 px-10 py-3 bg-white">
<div class="flex items-center gap-8">
<div class="flex items-center gap-4 text-nord-dark">
<div class="size-6 text-primary">
<span class="material-symbols-outlined text-3xl">task_alt</span>
</div>
<h2 class="text-nord-dark text-lg font-bold leading-tight tracking-tight">Nord Todo</h2>
</div>
<nav class="flex items-center gap-9">
<a class="text-nord-dark text-sm font-medium" href="#">Dashboard</a>
<a class="text-nord-text-muted text-sm font-medium" href="#">Projects</a>
<a class="text-nord-text-muted text-sm font-medium" href="#">Calendar</a>
<a class="text-nord-text-muted text-sm font-medium" href="#">Settings</a>
</nav>
</div>
<div class="flex flex-1 justify-end gap-8">
<div class="flex gap-2">
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-gray-100 text-nord-dark">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border border-gray-200" data-alt="User profile avatar circle" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB8x6jE133sI0HGFFR6xEAcCnMpN-gJh5mhcC9Rq9t0o2Skv6yelkiEoO-iZlc-IK46D4mmePEONps-YN-nEmbKu_NfteYdGfbYsVYP5-3n9wUQ_TlDG8GOSBBvLSQbVioCIPX5GUDKR8uxOMRMFPrTamsXN_zaS5Ho3-S3WwFNrB0xjfuq_W3A6DruJugNW1MwiFS_HdG7uAIkzZDiy4lMWjZOFnx210wy2l6Y7Fb8zEM_ZRUYHeVphV7JPZhAW_K_TmDgkP-UdZwn");'></div>
</div>
</div>
</header>
<main class="flex-1 px-10 py-8 max-w-6xl mx-auto w-full">
<div class="flex flex-wrap justify-between gap-3 mb-8">
<div class="flex flex-col gap-1">
<h1 class="text-nord-dark text-4xl font-black tracking-tight">My Tasks</h1>
<p class="text-nord-text-muted text-base">Manage your daily todos and projects</p>
</div>
<button class="flex items-center justify-center rounded-lg h-10 px-6 bg-primary text-white text-sm font-bold shadow-sm">
<span>+ Add Task</span>
</button>
</div>
<div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
<table class="w-full text-left">
<thead class="bg-gray-50 border-b border-gray-200">
<tr>
<th class="px-6 py-4 text-xs font-semibold text-nord-text-muted uppercase tracking-wider w-16 text-center">Status</th>
<th class="px-6 py-4 text-xs font-semibold text-nord-text-muted uppercase tracking-wider">Task Name</th>
<th class="px-6 py-4 text-xs font-semibold text-nord-text-muted uppercase tracking-wider w-32">Priority</th>
<th class="px-6 py-4 text-xs font-semibold text-nord-text-muted uppercase tracking-wider w-40">Due Date</th>
</tr>
</thead>
<tbody class="divide-y divide-gray-100">
<tr>
<td class="px-6 py-4 text-center">
<input class="h-5 w-5 rounded border-gray-300 text-primary focus:ring-primary/20" type="checkbox"/>
</td>
<td class="px-6 py-4 text-nord-dark font-medium">Update design system</td>
<td class="px-6 py-4">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">High</span>
</td>
<td class="px-6 py-4 text-nord-text-muted text-sm">Today</td>
</tr>
<tr>
<td class="px-6 py-4 text-center">
<input class="h-5 w-5 rounded border-gray-300 text-primary focus:ring-primary/20" type="checkbox"/>
</td>
<td class="px-6 py-4 text-nord-dark font-medium">Review pull requests</td>
<td class="px-6 py-4">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">Medium</span>
</td>
<td class="px-6 py-4 text-nord-text-muted text-sm">Tomorrow</td>
</tr>
</tbody>
</table>
</div>
</main>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-nord">
<!-- Modal Card -->
<div class="w-full max-w-[480px] bg-nord-snow rounded-xl modal-shadow overflow-hidden flex flex-col animate-in fade-in zoom-in duration-200">
<div class="p-6">
<!-- Heading -->
<h2 class="text-[22px] font-semibold text-nord-dark mb-6 tracking-tight">Add New Todo</h2>
<!-- Form Fields -->
<div class="space-y-5">
<!-- Title Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-nord-text-muted ml-0.5" for="todo-title">Title</label>
<input class="w-full h-12 px-4 rounded-lg bg-white border border-nord-border text-nord-dark placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="todo-title" name="todo-title" placeholder="e.g., Weekly Sync" type="text"/>
</div>
<!-- Description Textarea -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-nord-text-muted ml-0.5" for="todo-desc">Description</label>
<textarea class="w-full p-4 rounded-lg bg-white border border-nord-border text-nord-dark placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none resize-none" id="todo-desc" name="todo-desc" placeholder="Enter task details..." rows="4"></textarea>
</div>
<!-- Additional Details Row (Visual Polish) -->
<div class="flex gap-4">
<div class="flex-1 flex flex-col gap-2">
<label class="text-sm font-medium text-nord-text-muted ml-0.5">Priority</label>
<div class="relative">
<select class="w-full h-11 px-4 rounded-lg bg-white border border-nord-border text-nord-dark focus:ring-2 focus:ring-primary/20 focus:border-primary appearance-none cursor-pointer">
<option>Low</option>
<option selected="">Medium</option>
<option>High</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-nord-text-muted pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex-1 flex flex-col gap-2">
<label class="text-sm font-medium text-nord-text-muted ml-0.5">Due Date</label>
<div class="relative">
<input class="w-full h-11 px-4 rounded-lg bg-white border border-nord-border text-nord-dark focus:ring-2 focus:ring-primary/20 focus:border-primary cursor-pointer" type="text" value="Oct 25, 2023"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-nord-text-muted pointer-events-none text-sm">calendar_today</span>
</div>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="flex items-center justify-end gap-3 px-6 py-4 bg-gray-50/50 border-t border-nord-border/50">
<button class="h-10 px-5 rounded-lg border border-nord-border text-nord-dark font-medium text-sm hover:bg-white transition-colors">
                    Cancel
                </button>
<button class="h-10 px-8 rounded-lg bg-primary text-white font-semibold text-sm hover:bg-nord-frost/90 transition-colors shadow-sm">
                    Save Task
                </button>
</div>
</div>
</div>
</body></html>
