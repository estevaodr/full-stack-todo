<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nord Todo Error State</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Font: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#be6069", // Nord Aurora Red
                        "background-light": "#ECEFF4", // Nord Snow Storm (Lightest)
                        "background-dark": "#2E3440", // Nord Polar Night
                        "nord-snow-medium": "#E5E9F0",
                        "nord-snow-dark": "#D8DEE9",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "banner": "10px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen text-slate-900 dark:text-slate-100 transition-colors duration-200">
<!-- Navigation Bar -->
<nav class="h-[64px] w-full bg-nord-snow-medium dark:bg-slate-800 border-b border-nord-snow-dark dark:border-slate-700 flex items-center justify-center px-4 sticky top-0 z-50">
<div class="w-full max-w-[960px] flex items-center justify-between">
<!-- Brand -->
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="task_alt">task_alt</span>
<h1 class="text-lg font-bold tracking-tight text-slate-800 dark:text-slate-100">TodoApp</h1>
</div>
<!-- Actions -->
<div class="flex items-center gap-3">
<button class="p-2 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-colors flex items-center justify-center text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined" data-icon="light_mode">light_mode</span>
</button>
</div>
</div>
</nav>
<!-- Main Content Area -->
<main class="w-full flex justify-center py-8 px-4">
<div class="w-full max-w-[960px] flex flex-col gap-6">
<!-- Error Banner -->
<!-- Background rgba(191,97,106,0.1) derived from primary #be6069 -->
<div class="flex items-center gap-3 p-4 bg-primary/10 border border-primary rounded-banner">
<div class="flex-shrink-0">
<span class="material-symbols-outlined text-[20px] text-primary leading-none" data-icon="warning">warning</span>
</div>
<div class="flex flex-col">
<p class="text-[14px] font-medium text-primary">
                        Failed to load todos. Please try again later.
                    </p>
</div>
</div>
<!-- Empty State / Placeholder Area -->
<!-- This represents the rest of the page remaining empty as per description -->
<div class="mt-12 flex flex-col items-center justify-center py-20 opacity-20">
<div class="w-24 h-24 rounded-full bg-nord-snow-dark dark:bg-slate-700 mb-4 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl" data-icon="cloud_off">cloud_off</span>
</div>
<div class="h-4 w-48 bg-nord-snow-dark dark:bg-slate-700 rounded-full mb-2"></div>
<div class="h-3 w-32 bg-nord-snow-dark dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</main>
<!-- Footer for visual balance (Optional, subtle) -->
<footer class="fixed bottom-0 w-full flex justify-center py-6 pointer-events-none">
<div class="w-full max-w-[960px] px-4 flex justify-between items-center opacity-30 text-xs font-medium text-slate-500">
<span>Nord UI System</span>
<span>v1.0.4</span>
</div>
</footer>
</body></html>
