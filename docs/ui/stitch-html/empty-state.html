<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nord Todo Empty State</title>
<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#5E81AC", // Nord Frost Blue
              "nord-night-dark": "#2E3440", // Nord Polar Night
              "nord-night-light": "#4C566A", // Nord Polar Night Light
              "nord-snow-base": "#ECEFF4", // Nord Snow Storm Base
              "nord-snow-dark": "#E5E9F0", // Nord Snow Storm Darker
              "background-light": "#ECEFF4",
              "background-dark": "#15191d",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px",
              "nord-btn": "6px",
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom opacity for the icon as per specs */
        .nord-icon-opacity {
            color: #4C566A;
            opacity: 0.5;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-x-hidden min-h-screen flex flex-col">
<!-- Top Navigation Bar (64px height) -->
<nav class="h-[64px] w-full bg-nord-snow-dark dark:bg-slate-900 border-b border-nord-snow-dark dark:border-slate-800 px-6 flex items-center justify-center sticky top-0 z-50">
<div class="max-w-[960px] w-full flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">task_alt</span>
</div>
<h1 class="text-nord-night-dark dark:text-slate-100 text-lg font-bold tracking-tight">TodoApp</h1>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-lg hover:bg-nord-snow-base dark:hover:bg-slate-800 transition-colors text-nord-night-light dark:text-slate-400">
<span class="material-symbols-outlined" data-icon="light_mode">light_mode</span>
</button>
<div class="size-8 rounded-full bg-primary/20 flex items-center justify-center text-primary font-semibold text-xs border border-primary/30">
                    JD
                </div>
</div>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-4">
<div class="max-w-[960px] w-full flex flex-col items-center">
<!-- Empty State Stack: 16px vertical spacing (gap-4) -->
<div class="flex flex-col items-center gap-4 text-center">
<!-- Icon: 48px outlined clipboard -->
<div class="w-12 h-12 flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] nord-icon-opacity">content_paste</span>
</div>
<!-- Text Content Stack -->
<div class="flex flex-col gap-2">
<!-- Heading: 22px semibold #2E3440 -->
<h2 class="text-[22px] font-semibold text-nord-night-dark dark:text-slate-100 leading-tight">
                        No todos yet
                    </h2>
<!-- Body: 16px regular #4C566A -->
<p class="text-base font-normal text-nord-night-light dark:text-slate-400">
                        Create your first todo to get started
                    </p>
</div>
<!-- Primary CTA: 40px height, 6px radius, #5E81AC background -->
<button class="h-10 px-6 bg-primary hover:bg-primary/90 text-white font-semibold rounded-[6px] transition-all flex items-center justify-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-sm">add</span>
<span>Add Todo</span>
</button>
</div>
</div>
</main>
<!-- Optional Footer / Background Pattern Elements (Decorative) -->
<div class="fixed bottom-0 left-0 w-full h-1/3 pointer-events-none z-[-1] overflow-hidden opacity-30">
<div class="absolute -bottom-10 -left-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-20 -right-20 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
</div>
</body></html>
